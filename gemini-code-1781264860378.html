<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הקישורים של LiorsLife</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-pattern"></div>
    
    <div class="container">
        <header class="profile">
            <div class="avatar-wrapper">
                <img src="https://via.placeholder.com/120" alt="תמונת פרופיל" class="avatar">
            </div>
            <h1 class="username">LiorsLife</h1>
            <p class="bio">ברוכים הבאים לעמוד שלי! מוזמנים לעקוב אחריי בכל הרשתות ולהיכנס ללייבים.</p>
        </header>

        <main class="links">
            <a href="https://kick.com/liorslife" class="link-btn kick" target="_blank">
                <i class="fa-solid fa-k icon-right"></i>
                <span class="btn-text">Kick</span>
                <span class="badge">LIVE</span>
            </a>

            <a href="YOUR_LINK_HERE" class="link-btn youtube" target="_blank">
                <i class="fa-brands fa-youtube icon-right"></i>
                <span class="btn-text">YouTube</span>
            </a>

            <a href="YOUR_LINK_HERE" class="link-btn tiktok" target="_blank">
                <i class="fa-brands fa-tiktok icon-right"></i>
                <span class="btn-text">TikTok</span>
            </a>

            <a href="YOUR_LINK_HERE" class="link-btn discord" target="_blank">
                <i class="fa-brands fa-discord icon-right"></i>
                <span class="btn-text">Discord</span>
            </a>

            <a href="YOUR_LINK_HERE" class="link-btn instagram" target="_blank">
                <i class="fa-brands fa-instagram icon-right"></i>
                <span class="btn-text">Instagram</span>
            </a>
        </main>

        <footer>
            <p>© 2026 LiorsLife</p>
        </footer>
    </div>
</body>
</html>
